spring:
  datasource:
    url: jdbc:mysql://localhost:3306/product_order_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always # Garante que vai rodar o data.sql
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true # Aguarda o Hibernate criar as tabelas antes de rodar o SQL
    show-sql: true

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

elasticsearch:
  uris: http://localhost:9200