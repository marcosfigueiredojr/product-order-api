spring:
  datasource:
    url: jdbc:mysql://localhost:3306/product_order_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # 🚫 Removemos o sql.init que causava o loop com o Flyway
  flyway:
    enabled: false # Desativamos o Flyway nos testes de integração para evitar o conflito, já que o ddl-auto vai criar o esquema

  jpa:
    hibernate:
      ddl-auto: create-drop # 🔄 Cria a estrutura limpa e deleta ao fim dos testes
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        # ⚡ Instrução direta para o Hibernate executar nosso script de massa após estruturar o banco
        hbm2ddl:
          import_files: data.sql 

  kafka:
    bootstrap-servers: localhost:9092

  data:
    redis:
      host: localhost
      port: 6379

elasticsearch:
  uris: http://localhost:9200