name: CI/CD Pipeline - Product Order API

on:
  push:
    branches:
      - main # Dispara o pipeline sempre que houver push na branch principal

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build, Test and Deploy to AWS ECS
    runs-on: ubuntu-latest

    # INFRAESTRUTURA DE BANCOS E BROKERS ADICIONADA:
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: product_order_db
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:7.0-alpine
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

      kafka:
        image: confluentinc/cp-kafka:7.3.0
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
          KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:29092,PLAINTEXT_HOST://localhost:9092'
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
          KAFKA_PROCESS_ROLES: 'broker,controller'
          KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:29093'
          KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
          KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
          KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
          KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
          CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
        ports:
          - 9200:9200
        env:
          discovery.type: single-node
          CHECK_LOCAL_USER: 'false'
          xpack.security.enabled: 'false'
        options: --health-cmd="curl http://localhost:9200/_cluster/health" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    # 1. Checkout do código fonte do repositório
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Configuração do ambiente Java (JDK 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Cacheia as dependências para acelerar builds futuros

    # 3. Compilação e Testes Unitários com Maven (JUnit) usando o Wrapper local
    - name: Build and Test with Maven
      run: ./mvnw clean package -Dspring.profiles.active=test

    # 4. Configuração das credenciais AWS de forma segura usando as Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 5. Autenticação do Docker no Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 6. Build da Imagem Docker e Push para o ECR (Gera tag com SHA do Commit e 'latest')
    - name: Build, Tag, and Push Image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: product-order-api
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Constrói a imagem apontando para o seu ECR oficial
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Sobe ambas as tags para o seu repositório da AWS
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Exporta o endereço exato da nova imagem para o próximo passo
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 7. Modifica dinamicamente o arquivo local task-definition.json com a nova imagem gerada
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json # Localizado na raiz do projeto
        container-name: product-order-api
        image: ${{ steps.build-image.outputs.image }}

    # 8. Executa o deploy (Rolling Update) no Serviço do ECS sem downtime
    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: product-order-service
        cluster: product-order-cluster
        wait-for-service-stability: true # Aguarda o container novo subir com sucesso antes de matar o antigo