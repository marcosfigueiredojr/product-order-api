name: CI/CD Pipeline - Product Order API

on:
  push:
    branches:
      - main # Dispara o pipeline sempre que houver push na branch principal

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build, Test and Deploy to AWS ECS
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout do código fonte do repositório
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Configuração do ambiente Java (JDK 21)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Cacheia as dependências para acelerar builds futuros

    # 3. Compilação e Testes Unitários com Maven (JUnit)
    - name: Build and Test with Maven
      run: mvn clean package

    # 4. Configuração das credenciais AWS de forma segura usando as Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    # 5. Autenticação do Docker no Amazon ECR
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    # 6. Build da Imagem Docker e Push para o ECR (Gera tag com SHA do Commit e 'latest')
    - name: Build, Tag, and Push Image to Amazon ECR
      id: build-image
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: product-order-api
        IMAGE_TAG: ${{ github.sha }}
      run: |
        # Constrói a imagem apontando para o seu ECR oficial
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
        
        # Sobe ambas as tags para o seu repositório da AWS
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
        
        # Exporta o endereço exato da nova imagem para o próximo passo
        echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

    # 7. Modifica dinamicamente o arquivo local task-definition.json com a nova imagem gerada
    - name: Fill in the new image ID in the Amazon ECS task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition: task-definition.json # Localizado na raiz do projeto
        container-name: product-order-api
        image: ${{ steps.build-image.outputs.image }}

    # 8. Executa o deploy (Rolling Update) no Serviço do ECS sem downtime
    - name: Deploy Amazon ECS task definition
      uses: aws-actions/amazon-ecs-deploy-task-definition@v2
      with:
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        service: product-order-service
        cluster: product-order-cluster
        wait-for-service-stability: true # Aguarda o container novo subir com sucesso antes de matar o antigo